openapi: 3.1.0
info:
  title: AFAL Phase 1 HTTP Capability Contract
  version: 0.1.0-draft
  summary: OpenAPI-style draft for the framework-free AFAL capability transport layer
  description: |
    This draft describes the Phase 1 HTTP surface above the AFAL API adapter.

    It is intentionally narrow and tracks the current implementation under `backend/afal/http/`.
    The goal is to freeze route names, request envelopes, status-code behavior, and top-level
    response semantics before choosing an HTTP server framework.

    Phase 1 scope in this draft:
    - request payment approval capability
    - execute payment capability
    - request resource approval capability
    - settle resource usage capability
    - approval session lookup, callback result application, authorization resume, and AFAL action resume
    - stable requestRef handling
    - structured success/error envelopes

    Current behavior note:
    - `request-payment-approval` and `request-resource-approval` expose top-level `pending-approval` AFAL responses
    - `resume-approved-action` resumes a persisted approved action into settlement and receipt creation
    - `execute-payment` and `settle-resource-usage` still represent the synchronous seeded flow path

servers:
  - url: https://api.afal.local
    description: Placeholder server for contract drafting only

tags:
  - name: Capabilities
    description: AFAL machine-invokable financial capabilities
  - name: Notifications
    description: Notification outbox, worker, and operator-facing delivery administration
  - name: Approvals
    description: AFAL trusted-surface approval session operations

paths:
  /capabilities/request-payment-approval:
    post:
      tags: [Capabilities]
      operationId: requestPaymentApproval
      summary: Create a top-level pending payment approval request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestPaymentApprovalHttpRequest"
      responses:
        "200":
          description: Payment request entered pending approval state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestPaymentApprovalSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalErrorResponse"

  /capabilities/execute-payment:
    post:
      tags: [Capabilities]
      operationId: executePayment
      summary: Execute a payment capability request
      description: |
        Accepts a structured payment capability request and returns either a fully structured
        payment flow result or a structured AFAL error envelope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutePaymentHttpRequest"
            examples:
              canonical-payment:
                summary: Canonical Phase 1 payment request
                value:
                  requestRef: req-0001
                  input:
                    requestRef: req-0001
                    monetaryBudgetRef: budg-money-001
                    intent:
                      intentId: payint-0001
                      schemaVersion: "0.1"
                      intentType: payment
                      payer:
                        agentDid: did:afal:agent:payment-agent-01
                        accountId: acct-agent-001
                      payee:
                        payeeDid: did:afal:agent:fraud-service-01
                        settlementAddress: 0xFRAUDSERVICEPAYEE
                      asset: USDC
                      amount: "45.00"
                      chain: base
                      purpose:
                        category: service-payment
                        description: fraud detection request #abc123
                        referenceId: svc-req-abc123
                      mandateRef: mnd-0001
                      policyRef: cred-policy-0001
                      executionMode: pre-authorized
                      challengeState: required
                      status: created
                      expiresAt: "2026-03-24T12:10:00Z"
                      nonce: n-0001
                      createdAt: "2026-03-24T12:05:00Z"
      responses:
        "200":
          description: Payment flow completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutePaymentSuccessResponse"
              examples:
                canonical-payment-success:
                  summary: Canonical payment success response
                  value:
                    ok: true
                    capability: executePayment
                    requestRef: req-0001
                    statusCode: 200
                    data:
                      intent:
                        intentId: payint-0001
                        status: settled
                        challengeState: approved
                        settlementRef: stl-0001
                        receiptRef: rcpt-pay-0001
                      initialDecision:
                        decisionId: dec-0001
                        result: challenge-required
                      finalDecision:
                        decisionId: dec-0002
                        result: approved
                      settlement:
                        settlementId: stl-0001
                        status: settled
                      paymentReceipt:
                        receiptId: rcpt-pay-0001
                        receiptType: payment
                        status: final
                      capabilityResponse:
                        responseId: cap-0001
                        result: approved
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        "503":
          $ref: "#/components/responses/ServiceUnavailableResponse"
        "500":
          $ref: "#/components/responses/InternalErrorResponse"

  /capabilities/request-resource-approval:
    post:
      tags: [Capabilities]
      operationId: requestResourceApproval
      summary: Create a top-level pending resource approval request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestResourceApprovalHttpRequest"
      responses:
        "200":
          description: Resource request entered pending approval state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestResourceApprovalSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalErrorResponse"

  /capabilities/settle-resource-usage:
    post:
      tags: [Capabilities]
      operationId: settleResourceUsage
      summary: Execute a resource settlement capability request
      description: |
        Accepts a structured resource capability request and returns either a fully structured
        resource flow result or a structured AFAL error envelope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettleResourceUsageHttpRequest"
            examples:
              canonical-resource:
                summary: Canonical Phase 1 resource settlement request
                value:
                  requestRef: req-1001
                  input:
                    requestRef: req-1001
                    resourceBudgetRef: budg-res-001
                    resourceQuotaRef: quota-001
                    intent:
                      intentId: resint-0001
                      schemaVersion: "0.1"
                      intentType: resource
                      requester:
                        agentDid: did:afal:agent:research-agent-01
                        accountId: acct-agent-002
                      provider:
                        providerId: provider-openai
                        providerDid: did:afal:institution:provider-openai
                      resource:
                        resourceClass: inference
                        resourceUnit: tokens
                        quantity: 500000
                      pricing:
                        maxSpend: "18.50"
                        asset: USDC
                      budgetSource:
                        type: ats-budget
                        reference: budg-res-001
                      mandateRef: mnd-0002
                      policyRef: cred-policy-0002
                      executionMode: pre-authorized
                      challengeState: required
                      status: created
                      expiresAt: "2026-03-24T12:30:00Z"
                      nonce: n-2001
                      createdAt: "2026-03-24T12:20:00Z"
      responses:
        "200":
          description: Resource settlement flow completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettleResourceUsageSuccessResponse"
              examples:
                canonical-resource-success:
                  summary: Canonical resource settlement success response
                  value:
                    ok: true
                    capability: settleResourceUsage
                    requestRef: req-1001
                    statusCode: 200
                    data:
                      intent:
                        intentId: resint-0001
                        status: settled
                        challengeState: approved
                        settlementRef: stl-1001
                        usageReceiptRef: usage-1001
                      initialDecision:
                        decisionId: dec-1001
                        result: challenge-required
                      finalDecision:
                        decisionId: dec-1002
                        result: approved
                      usageConfirmation:
                        usageReceiptRef: usage-1001
                      settlement:
                        settlementId: stl-1001
                        status: settled
                      resourceReceipt:
                        receiptId: rcpt-res-1001
                        receiptType: resource
                        status: final
                      capabilityResponse:
                        responseId: cap-1001
                        result: approved
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        "502":
          $ref: "#/components/responses/ProviderFailureResponse"
        "503":
          $ref: "#/components/responses/ServiceUnavailableResponse"
        "500":
          $ref: "#/components/responses/InternalErrorResponse"

  /actions/get:
    post:
      tags: [Actions]
      operationId: getActionStatus
      summary: Read the latest AFAL action status for a payment or resource action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetActionStatusHttpRequest"
            examples:
              canonical-get-payment-action-status:
                value:
                  requestRef: req-action-status-payment-001
                  input:
                    actionRef: payint-0001
              canonical-get-resource-action-status:
                value:
                  requestRef: req-action-status-resource-001
                  input:
                    actionRef: resint-0001
      responses:
        "200":
          description: AFAL action status resolved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetActionStatusSuccessResponse"
              examples:
                payment-status:
                  value:
                    ok: true
                    capability: getActionStatus
                    requestRef: req-action-status-payment-001
                    statusCode: 200
                    data:
                      actionType: payment
                      intent:
                        intentId: payint-0001
                        status: settled
                        settlementRef: stl-0001
                        receiptRef: rcpt-pay-0001
                      finalDecision:
                        decisionId: dec-0002
                        result: approved
                      settlement:
                        settlementId: stl-0001
                        status: settled
                      approvalReceipt:
                        receiptId: rcpt-approval-0001
                        receiptType: approval
                        status: final
                      paymentReceipt:
                        receiptId: rcpt-pay-0001
                        receiptType: payment
                        status: final
                      capabilityResponse:
                        responseId: resp-generated-0002
                        capability: resumeApprovedAction
                        result: approved
                resource-status:
                  value:
                    ok: true
                    capability: getActionStatus
                    requestRef: req-action-status-resource-001
                    statusCode: 200
                    data:
                      actionType: resource
                      intent:
                        intentId: resint-0001
                        status: settled
                        usageReceiptRef: usage-1001
                        settlementRef: stl-1001
                      finalDecision:
                        decisionId: dec-1002
                        result: approved
                      usageConfirmation:
                        usageReceiptRef: usage-1001
                        quantity: 500000
                      settlement:
                        settlementId: stl-1001
                        status: settled
                      approvalReceipt:
                        receiptId: rcpt-approval-1001
                        receiptType: approval
                        status: final
                      resourceReceipt:
                        receiptId: rcpt-res-1001
                        receiptType: resource
                        status: final
                      capabilityResponse:
                        responseId: resp-generated-0002
                        capability: resumeApprovedAction
                        result: approved
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalErrorResponse"

  /notification-deliveries/get:
    post:
      tags: [Notifications]
      operationId: getNotificationDelivery
      summary: Read a persisted settlement notification delivery record
      parameters:
        - $ref: "#/components/parameters/OperatorTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetNotificationDeliveryHttpRequest"
            examples:
              canonical-get-notification-delivery:
                value:
                  requestRef: req-notification-delivery-get-001
                  input:
                    notificationId: notif-payint-0001
      responses:
        "200":
          description: Notification delivery record resolved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetNotificationDeliverySuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalErrorResponse"

  /notification-deliveries/list:
    post:
      tags: [Notifications]
      operationId: listNotificationDeliveries
      summary: List persisted settlement notification delivery records
      parameters:
        - $ref: "#/components/parameters/OperatorTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListNotificationDeliveriesHttpRequest"
            examples:
              canonical-list-notification-deliveries:
                value:
                  requestRef: req-notification-delivery-list-001
                  input: {}
      responses:
        "200":
          description: Notification delivery records listed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListNotificationDeliveriesSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "500":
          $ref: "#/components/responses/InternalErrorResponse"

  /notification-deliveries/redeliver:
    post:
      tags: [Notifications]
      operationId: redeliverNotification
      summary: Redeliver a persisted settlement notification using the current outbox entry
      parameters:
        - $ref: "#/components/parameters/OperatorTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeliverNotificationHttpRequest"
            examples:
              canonical-redeliver-notification:
                value:
                  requestRef: req-notification-delivery-redeliver-001
                  input:
                    notificationId: notif-payint-0001
      responses:
        "200":
          description: Notification delivery redelivered and current delivery record returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedeliverNotificationSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalErrorResponse"

  /notification-worker/get:
    post:
      tags: [Notifications]
      operationId: getNotificationWorkerStatus
      summary: Read the notification outbox worker status
      parameters:
        - $ref: "#/components/parameters/OperatorTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationWorkerCommandHttpRequest"
      responses:
        "200":
          description: Notification worker status resolved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetNotificationWorkerStatusSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "500":
          $ref: "#/components/responses/InternalErrorResponse"

  /notification-worker/start:
    post:
      tags: [Notifications]
      operationId: startNotificationWorker
      summary: Start the notification outbox worker
      parameters:
        - $ref: "#/components/parameters/OperatorTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationWorkerCommandHttpRequest"
      responses:
        "200":
          description: Notification worker started successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartNotificationWorkerSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "500":
          $ref: "#/components/responses/InternalErrorResponse"

  /notification-worker/stop:
    post:
      tags: [Notifications]
      operationId: stopNotificationWorker
      summary: Stop the notification outbox worker
      parameters:
        - $ref: "#/components/parameters/OperatorTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationWorkerCommandHttpRequest"
      responses:
        "200":
          description: Notification worker stopped successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopNotificationWorkerSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "500":
          $ref: "#/components/responses/InternalErrorResponse"

  /notification-worker/run:
    post:
      tags: [Notifications]
      operationId: runNotificationWorker
      summary: Trigger a single notification outbox worker cycle immediately
      parameters:
        - $ref: "#/components/parameters/OperatorTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationWorkerCommandHttpRequest"
      responses:
        "200":
          description: Notification worker cycle completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunNotificationWorkerSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "500":
          $ref: "#/components/responses/InternalErrorResponse"

  /admin-audit/get:
    post:
      tags: [Notifications]
      operationId: getAdminAuditEntry
      summary: Read a persisted operator audit log entry for notification admin activity
      parameters:
        - $ref: "#/components/parameters/OperatorTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetAdminAuditEntryHttpRequest"
            examples:
              canonical-get-admin-audit-entry:
                value:
                  requestRef: req-admin-audit-get-001
                  input:
                    auditId: admin-audit-req-notification-delivery-redeliver-001
      responses:
        "200":
          description: Operator audit entry resolved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAdminAuditEntrySuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalErrorResponse"

  /admin-audit/list:
    post:
      tags: [Notifications]
      operationId: listAdminAuditEntries
      summary: List persisted operator audit log entries for notification admin activity
      parameters:
        - $ref: "#/components/parameters/OperatorTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListAdminAuditEntriesHttpRequest"
            examples:
              canonical-list-admin-audit-entries:
                value:
                  requestRef: req-admin-audit-list-001
                  input: {}
      responses:
        "200":
          description: Operator audit entries listed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAdminAuditEntriesSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "500":
          $ref: "#/components/responses/InternalErrorResponse"

  /approval-sessions/get:
    post:
      tags: [Approvals]
      operationId: getApprovalSession
      summary: Read a persisted approval session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetApprovalSessionHttpRequest"
            examples:
              canonical-get-approval-session:
                value:
                  requestRef: req-approval-session-001
                  input:
                    approvalSessionRef: aps-chall-0001
      responses:
        "200":
          description: Approval session resolved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetApprovalSessionSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalErrorResponse"

  /approval-sessions/apply-result:
    post:
      tags: [Approvals]
      operationId: applyApprovalResult
      summary: Apply a trusted-surface approval callback result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyApprovalResultHttpRequest"
      responses:
        "200":
          description: Approval result was persisted against the approval session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplyApprovalResultSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalErrorResponse"

  /approval-sessions/resume:
    post:
      tags: [Approvals]
      operationId: resumeApprovalSession
      summary: Resume authorization after an approval result is present
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResumeApprovalSessionHttpRequest"
      responses:
        "200":
          description: Approval session resumed and final authorization was produced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeApprovalSessionSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalErrorResponse"

  /approval-sessions/resume-action:
    post:
      tags: [Approvals]
      operationId: resumeApprovedAction
      summary: Resume an approved AFAL action into settlement, receipt, and final response creation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResumeApprovedActionHttpRequest"
      responses:
        "200":
          description: Approved action resumed to final AFAL settlement output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeApprovedActionSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        "502":
          $ref: "#/components/responses/ProviderFailureResponse"
        "503":
          $ref: "#/components/responses/ServiceUnavailableResponse"
        "500":
          $ref: "#/components/responses/InternalErrorResponse"

components:
  parameters:
    OperatorTokenHeader:
      name: x-afal-operator-token
      in: header
      required: false
      description: Required for notification outbox and worker admin routes when operator auth is configured on the AFAL HTTP server.
      schema:
        type: string
  responses:
    BadRequestResponse:
      description: Request envelope or transport shape is invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            request-ref-mismatch:
              summary: requestRef mismatch between HTTP envelope and capability input
              value:
                ok: false
                capability: executePayment
                requestRef: req-envelope
                statusCode: 400
                error:
                  code: bad-request
                  message: "requestRef must match between the HTTP envelope and capability input"
            unsupported-method:
              summary: unsupported method for a capability route
              value:
                ok: false
                capability: executePayment
                requestRef: unknown
                statusCode: 400
                error:
                  code: bad-request
                  message: "executePayment transport only supports POST"
    ForbiddenResponse:
      description: Capability cannot proceed because authorization or credential checks failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            credential-verification-failed:
              summary: policy credential could not be verified
              value:
                ok: false
                capability: executePayment
                requestRef: req-0001
                statusCode: 403
                error:
                  code: credential-verification-failed
                  message: 'Mock AFAL flow requires a verified policy credential: "cred-policy-0001"'
            authorization-rejected:
              summary: approval was rejected before settlement
              value:
                ok: false
                capability: executePayment
                requestRef: req-0001
                statusCode: 403
                error:
                  code: authorization-rejected
                  message: 'Mock payment flow stopped before settlement because authorization result was "rejected"'
            operator-auth-required:
              summary: notification admin route called without the configured operator token
              value:
                ok: false
                capability: getNotificationWorkerStatus
                requestRef: req-notification-worker-status-001
                statusCode: 403
                error:
                  code: operator-auth-required
                  message: 'Missing or invalid operator token in header "x-afal-operator-token"'
    NotFoundResponse:
      description: Referenced route, DID, account, budget, quota, or action is unknown
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            unknown-account:
              summary: payer account reference is not known
              value:
                ok: false
                capability: executePayment
                requestRef: req-0001
                statusCode: 404
                error:
                  code: not-found
                  message: 'Unknown accountRef "acct-missing" for mock ATS state'
            unknown-resource-budget:
              summary: resource budget reference is not known
              value:
                ok: false
                capability: settleResourceUsage
                requestRef: req-1001
                statusCode: 404
                error:
                  code: not-found
                  message: 'Unknown resource budget "budg-res-missing" for mock ATS state'
            unknown-approval-session:
              summary: approval session reference is not known
              value:
                ok: false
                capability: getApprovalSession
                requestRef: req-approval-session-001
                statusCode: 404
                error:
                  code: not-found
                  message: 'Unknown approvalSessionRef "aps-missing-001"'
    ConflictResponse:
      description: Capability request reached a non-terminal conflict such as expired or cancelled approval
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            authorization-expired:
              summary: approval expired before settlement could proceed
              value:
                ok: false
                capability: executePayment
                requestRef: req-0001
                statusCode: 409
                error:
                  code: authorization-expired
                  message: 'Mock payment flow stopped before settlement because authorization result was "expired"'
            authorization-cancelled:
              summary: approval was cancelled before resource settlement
              value:
                ok: false
                capability: settleResourceUsage
                requestRef: req-1001
                statusCode: 409
                error:
                  code: authorization-cancelled
                  message: 'Mock resource flow stopped before settlement because authorization result was "cancelled"'
            external-adapter-rejected:
              summary: external payment rail or provider rejected the action
              value:
                ok: false
                capability: executePayment
                requestRef: req-0001
                statusCode: 409
                error:
                  code: external-adapter-rejected
                  message: "counterparty rejected settlement"
    ProviderFailureResponse:
      description: Downstream provider usage confirmation or settlement dependency failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            provider-usage-confirmation-failed:
              summary: provider usage confirmation dependency failed
              value:
                ok: false
                capability: settleResourceUsage
                requestRef: req-1001
                statusCode: 502
                error:
                  code: provider-failure
                  message: "Provider usage confirmation failed"
    ServiceUnavailableResponse:
      description: External adapter dependency is temporarily unavailable and the request can be retried
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            external-adapter-unavailable:
              summary: external payment rail or provider is temporarily unavailable
              value:
                ok: false
                capability: executePayment
                requestRef: req-0001
                statusCode: 503
                error:
                  code: external-adapter-unavailable
                  message: "payment rail unavailable"
    InternalErrorResponse:
      description: Unclassified server-side failure
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            internal-error:
              summary: fallback internal error mapping
              value:
                ok: false
                capability: executePayment
                requestRef: req-0001
                statusCode: 500
                error:
                  code: internal-error
                  message: "Unknown AFAL API error"

